<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jewish Heritage Regions — 12 Months, 12 Worlds</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Source Serif 4', Georgia, serif;
    background: #fdf6e3;
    color: #2c1810;
    line-height: 1.7;
  }

  a { color: #1a3a5c; text-decoration: none; transition: color 0.3s; }
  a:hover { color: #c9a227; }

  nav {
    position: sticky;
    top: 0;
    background: white;
    border-bottom: 2px solid #e8d5a3;
    padding: 1rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1000;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: #1a3a5c;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .nav-links {
    display: flex;
    gap: 2rem;
    align-items: center;
  }

  .nav-links a {
    color: #2c1810;
    font-weight: 600;
    font-size: 0.95rem;
  }

  .nav-links a:hover { color: #c9a227; }

  .page-header {
    background: linear-gradient(135deg, #1a3a5c 0%, #0d2137 100%);
    color: white;
    padding: 4rem 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .page-header::after {
    content: '✡';
    position: absolute;
    right: 5%;
    top: 50%;
    transform: translateY(-50%);
    font-size: 12rem;
    opacity: 0.05;
    color: #c9a227;
  }

  .page-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.8rem;
    color: #e8d5a3;
    margin-bottom: 1rem;
    position: relative;
    z-index: 2;
  }

  .page-header p {
    color: #b8a88a;
    font-size: 1.1rem;
    max-width: 600px;
    margin: 0 auto;
    position: relative;
    z-index: 2;
  }

  .regions-container {
    max-width: 1100px;
    margin: 3rem auto;
    padding: 0 2rem;
    display: flex;
    flex-direction: column;
    gap: 2.5rem;
  }

  .region-card {
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    display: grid;
    grid-template-columns: 4px 1fr;
    transition: box-shadow 0.3s;
  }

  .region-card:hover {
    box-shadow: 0 8px 30px rgba(0,0,0,0.12);
  }

  .region-color-bar {
    width: 6px;
    /* background-color set by JS */
  }

  .region-inner {
    padding: 2rem 2.5rem;
  }

  .region-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1rem;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .region-month-badge {
    display: inline-block;
    padding: 0.4rem 1rem;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: white;
    white-space: nowrap;
  }

  .region-community-count {
    background: #fdf6e3;
    border: 1px solid #e8d5a3;
    color: #6b5d4f;
    padding: 0.4rem 1rem;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 600;
    white-space: nowrap;
  }

  .region-name {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: #1a3a5c;
    margin-bottom: 0.5rem;
    line-height: 1.2;
  }

  .region-tagline {
    font-style: italic;
    color: #6b5d4f;
    font-size: 1.1rem;
    margin-bottom: 1.5rem;
    border-left: 3px solid #e8d5a3;
    padding-left: 1rem;
  }

  .region-description {
    color: #4a4035;
    margin-bottom: 1.5rem;
    font-size: 0.97rem;
    line-height: 1.8;
  }

  .key-facts-section {
    margin-bottom: 1.5rem;
  }

  .key-facts-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: #1a3a5c;
    margin-bottom: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-size: 0.85rem;
  }

  .key-facts-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .key-facts-list li {
    color: #4a4035;
    font-size: 0.9rem;
    padding-left: 1.5rem;
    position: relative;
  }

  .key-facts-list li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: #c9a227;
    font-weight: 600;
  }

  .countries-list {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }

  .country-badge {
    background: #fdf6e3;
    border: 1px solid #e8d5a3;
    color: #6b5d4f;
    padding: 0.25rem 0.75rem;
    border-radius: 15px;
    font-size: 0.8rem;
  }

  .explore-link {
    display: inline-block;
    padding: 0.75rem 1.5rem;
    border-radius: 5px;
    font-weight: 600;
    font-size: 0.95rem;
    transition: all 0.3s;
    color: white;
  }

  .explore-link:hover {
    transform: translateY(-2px);
    filter: brightness(1.1);
    color: white;
  }

  footer {
    background: #1a3a5c;
    color: #e8d5a3;
    padding: 3rem 2rem;
    text-align: center;
    margin-top: 4rem;
  }

  @media (max-width: 768px) {
    .page-header h1 { font-size: 1.8rem; }
    .region-header { flex-direction: column; }
    .region-name { font-size: 1.5rem; }
    .region-inner { padding: 1.5rem; }
  }
</style>
</head>
<body>
  <nav>
    <div class="nav-logo">
      <span>✡</span>
      <span>Jewish Heritage Calendar</span>
    </div>
    <div class="nav-links">
      <a href="index.html">Today</a>
      <a href="calendar.html">Calendar</a>
      <a href="regions.html">Regions</a>
      <a href="index.html#about">About</a>
    </div>
  </nav>

  <header class="page-header">
    <h1>Jewish Heritage Regions</h1>
    <p>12 Months · 12 Worlds · 3,000 Years of Jewish History Across the Globe</p>
  </header>

  <div class="regions-container" id="regions-container">
    <!-- Populated by JS -->
    <p style="text-align:center; padding:2rem; color:#6b5d4f; font-style:italic;">Loading regions…</p>
  </div>

  <footer>
    <p id="footer-year">Celebrating 365 Jewish Communities Worldwide · 2026</p>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      document.getElementById('footer-year').textContent =
        `Celebrating 365 Jewish Communities Worldwide · ${new Date().getFullYear()}`;

      try {
        const res = await fetch('/data/regions.json');
        if (!res.ok) throw new Error('Could not load regions.json');
        const regions = await res.json();

        const container = document.getElementById('regions-container');
        const currentMonth = new Date().getMonth() + 1;

        container.innerHTML = regions.map(region => {
          const isCurrentMonth = region.month === currentMonth;
          const factsHtml = (region.keyFacts || []).map(f =>
            `<li>${f}</li>`
          ).join('');

          const countriesHtml = (region.modernCountries || []).map(c =>
            `<span class="country-badge">${c}</span>`
          ).join('');

          const descExcerpt = region.heroDescription.length > 350
            ? region.heroDescription.slice(0, 350) + '…'
            : region.heroDescription;

          return `
            <div class="region-card" id="region-${region.id}" style="${isCurrentMonth ? 'outline: 2px solid ' + region.color + '; box-shadow: 0 8px 30px rgba(0,0,0,0.12);' : ''}">
              <div class="region-color-bar" style="background-color: ${region.color};"></div>
              <div class="region-inner">
                <div class="region-header">
                  <div style="display:flex; gap:0.75rem; align-items:center; flex-wrap:wrap;">
                    <span class="region-month-badge" style="background-color: ${region.color};">${region.monthName}</span>
                    ${isCurrentMonth ? '<span style="background:#c9a227; color:white; padding:0.4rem 0.8rem; border-radius:15px; font-size:0.75rem; font-weight:700;">▶ THIS MONTH</span>' : ''}
                  </div>
                  <span class="region-community-count">${region.communities} Communities</span>
                </div>

                <h2 class="region-name">${region.name}</h2>
                <p class="region-tagline">${region.tagline}</p>
                <p class="region-description">${descExcerpt}</p>

                <div class="key-facts-section">
                  <div class="key-facts-title">Key Historical Facts</div>
                  <ul class="key-facts-list">${factsHtml}</ul>
                </div>

                <div style="margin-bottom: 1.5rem;">
                  <div class="key-facts-title" style="margin-bottom:0.5rem;">Modern Countries</div>
                  <div class="countries-list">${countriesHtml}</div>
                </div>

                <a href="region/${region.id}.html" class="explore-link" style="background-color: ${region.color};">
                  Explore ${region.monthName} Communities →
                </a>
              </div>
            </div>
          `;
        }).join('');

      } catch(err) {
        document.getElementById('regions-container').innerHTML =
          `<p style="text-align:center; color:#922b21; padding:2rem;">${err.message}</p>`;
      }
    });
  </script>
</body>
</html>
